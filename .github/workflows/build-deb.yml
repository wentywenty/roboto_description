name: Build Roboto Description Deb Package

on:
  push:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y debhelper dh-make

      - name: Build Deb Packages
        run: |
          dpkg-buildpackage -us -uc -b
          mv ../*.deb .
          VERSION=$(dpkg-parsechangelog -S Version | cut -d'-' -f1 || echo "unknown")
          echo "PKG_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: roboto-description-v${{ env.PKG_VERSION }}-all
          path: "*.deb"

      - name: Release to GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"
